  <script>
    (function(){
      var host = location.hostname;
      var isPrivateLan = /^192\.168\./.test(host) || /^10\./.test(host) || /^172\.(1[6-9]|2\d|3[01])\./.test(host);
      var isLocalDev = host === "localhost" || host === "127.0.0.1" || host === "::1" || isPrivateLan;
      var migrationKey = "pitchiq-sw-retirement-20260715";
      var baseScope = new URL("./", location.href).href;
      window.__PITCHIQ_LOCAL_DEV__ = isLocalDev;
      function clearPitchIQCaches(){
        if (!("caches" in window)) return Promise.resolve(false);
        return caches.keys().then(function(keys){
          var pitchIQKeys = keys.filter(function(key){ return /^pitchiq-/i.test(key); });
          return Promise.all(pitchIQKeys.map(function(key){ return caches.delete(key); })).then(function(results){ return results.some(Boolean); });
        });
      }
      function unregisterPitchIQWorkers(){
        if (!("serviceWorker" in navigator)) return Promise.resolve(false);
        return navigator.serviceWorker.getRegistrations().then(function(registrations){
          var pitchIQRegistrations = registrations.filter(function(registration){ return registration.scope.indexOf(baseScope) === 0; });
          return Promise.all(pitchIQRegistrations.map(function(registration){ return registration.unregister(); })).then(function(results){ return results.some(Boolean); });
        });
      }
      if (isLocalDev) {
        Promise.all([unregisterPitchIQWorkers(), clearPitchIQCaches()]).catch(function(error){ console.warn("[PitchIQ dev] Could not clear service-worker state", error); });
        return;
      }
      if (sessionStorage.getItem(migrationKey) === "done") return;
      sessionStorage.setItem(migrationKey, "running");
      Promise.all([unregisterPitchIQWorkers(), clearPitchIQCaches()]).then(function(results){
        sessionStorage.setItem(migrationKey, "done");
        if (results.some(Boolean)) location.replace(location.href);
      }).catch(function(error){
        sessionStorage.setItem(migrationKey, "done");
        console.warn("[PitchIQ] Could not retire legacy service-worker state", error);
      });
    })();
  </script>

  <script>
    window.__PITCHIQ_BUILD__ = "landing-completion-race-fix-20260720";
    window.addEventListener("error", function(event){
      console.error("[PitchIQ boot error]", event.message, event.filename, event.lineno, event.colno);
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (box) { box.style.display = "block"; box.querySelector("p").textContent = "JavaScript error: " + (event.message || "unknown error"); }
    });
    window.addEventListener("unhandledrejection", function(event){
      console.error("[PitchIQ unhandled promise]", event.reason);
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (box) { box.style.display = "block"; box.querySelector("p").textContent = "Unhandled promise: " + (event.reason && event.reason.message ? event.reason.message : event.reason || "unknown error"); }
    });
    setTimeout(function(){
      var app = document.getElementById("app");
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (app && box && app.children.length === 0) box.style.display = "block";
    }, 2500);
    (function(){
      var recoveryTimer = 0;
      var directRouteTimer = 0;
      var recovering = false;
      function landingVisible(){ return Boolean(document.querySelector("#splash, .splash-cover-v3, [data-splash-swipe]")); }
      function swipeProgress(swipe){
        if (!swipe) return 0;
        if (swipe.classList.contains("complete")) return 1;
        var cssProgress = parseFloat(getComputedStyle(swipe).getPropertyValue("--swipe-progress"));
        if (isFinite(cssProgress) && cssProgress > 0) return Math.max(0, Math.min(1, cssProgress));
        var handle = swipe.querySelector(".splash-swipe-handle");
        var track = swipe.querySelector(".splash-swipe-track") || swipe;
        if (!handle || !track) return 0;
        var handleRect = handle.getBoundingClientRect();
        var trackRect = track.getBoundingClientRect();
        var travel = Math.max(1, trackRect.width - handleRect.width);
        return Math.max(0, Math.min(1, (handleRect.left - trackRect.left) / travel));
      }
      function directRoute(){
        if (!landingVisible()) return;
        var url = new URL(location.href);
        url.searchParams.set("dev", "1");
        url.searchParams.set("autoOnboard", "1");
        url.searchParams.set("v", "landing-completion-race-fix-20260720");
        url.hash = "onboard";
        location.replace(url.toString());
      }
      function activateLanding(){
        if (recovering || !landingVisible()) return;
        var swipe = document.querySelector("[data-splash-swipe]");
        if (!swipe) return;
        recovering = true;
        swipe.dispatchEvent(new MouseEvent("click", { bubbles:true, cancelable:true, view:window, detail:1 }));
        clearTimeout(directRouteTimer);
        directRouteTimer = setTimeout(directRoute, 700);
        setTimeout(function(){ recovering = false; }, 800);
      }
      function arm(){
        clearTimeout(recoveryTimer);
        recoveryTimer = setTimeout(function(){
          var swipe = document.querySelector("[data-splash-swipe]");
          if (landingVisible() && swipeProgress(swipe) >= 0.72) activateLanding();
        }, 250);
      }
      document.addEventListener("pointerup", arm, true);
      document.addEventListener("touchend", arm, true);
    })();
  </script>
