<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#020807"/>
  <title>PitchIQ Integrated v1</title>
  <link rel="manifest" href="manifest.json?v=asset-audit-20260618"/>
  <link rel="stylesheet" href="css/style.css?v=861bbe4"/>
  <link rel="stylesheet" href="css/splash-fit.css?v=landing-title-spacing-20260620"/>
  <link rel="stylesheet" href="css/onboarding-fix.css?v=step2-pitch-lift-20260621"/>
  <link rel="stylesheet" href="css/academy-hero-asset.css?v=asset-audit-20260618"/>
  <link rel="stylesheet" href="css/visual-layout-studio.css?v=asset-audit-20260618"/>
</head>
<body>
  <div class="world"><div class="spot a"></div><div class="spot b"></div><div class="pitch"></div></div>
  <div class="app-shell">
    <main id="app" class="app-scroll"></main>
    <nav id="nav" class="nav bottom-nav" aria-label="Main navigation"></nav>
  </div>
  <div id="pitchiq-boot-watchdog" style="display:none;position:fixed;inset:18px;z-index:9999;background:#06120D;color:#F7FFF8;border:1px solid rgba(215,255,46,.35);border-radius:24px;padding:22px;font-family:system-ui;box-shadow:0 30px 90px rgba(0,0,0,.45)"><h1 style="margin:0 0 8px;color:#D7FF2E">PitchIQ didn’t finish loading</h1><p style="margin:0;color:#A9B8AD">The app shell loaded, but JavaScript did not render a screen. Hard refresh, then check the browser console for the first red error.</p></div>
  <div id="toast" class="toast" role="status" aria-live="polite">+20 XP</div>
  <script>
    window.__PITCHIQ_BUILD__ = "step2-pitch-lift-20260621";
    window.addEventListener("error", function(event){
      console.error("[PitchIQ boot error]", event.message, event.filename, event.lineno, event.colno);
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (box) {
        box.style.display = "block";
        box.querySelector("p").textContent = "JavaScript error: " + (event.message || "unknown error");
      }
    });
    window.addEventListener("unhandledrejection", function(event){
      console.error("[PitchIQ unhandled promise]", event.reason);
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (box) {
        box.style.display = "block";
        box.querySelector("p").textContent = "Unhandled promise: " + (event.reason && event.reason.message ? event.reason.message : event.reason || "unknown error");
      }
    });
    setTimeout(function(){
      var app = document.getElementById("app");
      var box = document.getElementById("pitchiq-boot-watchdog");
      if (app && box && app.children.length === 0) box.style.display = "block";
    }, 2500);
  </script>
  <script type="module" src="js/app/main.js?v=step1-art-align-20260620"></script>
  <script type="module" src="js/dev/visual-layout-studio.js?v=asset-audit-20260618"></script>
  <script type="module" src="js/dev/dev-floating-panels.js?v=asset-audit-20260618"></script>
</body>
</html>
