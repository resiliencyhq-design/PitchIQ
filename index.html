      var host = location.hostname;
      var isPrivateLan = /^192\.168\./.test(host) || /^10\./.test(host) || /^172\.(1[6-9]|2\d|3[01])\./.test(host);
      var isLocalDev = host === "localhost" || host === "127.0.0.1" || host === "::1" || isPrivateLan;
      var migrationKey = "pitchiq-sw-retirement-20260715";
      var baseScope = new URL("./", location.href).href;
      window.__PITCHIQ_LOCAL_DEV__ = isLocalDev;
      function clearPitchIQCaches(){
        if (!("caches" in window)) return Promise.resolve(false);
        return caches.keys().then(function(keys){
          var pitchIQKeys = keys.filter(function(key){ return /^pitchiq-/i.test(key); });
          return Promise.all(pitchIQKeys.map(function(key){ return caches.delete(key); })).then(function(results){ return results.some(Boolean); });
        });
      }
      function unregisterPitchIQWorkers(){
        if (!("serviceWorker" in navigator)) return Promise.resolve(false);
        return navigator.serviceWorker.getRegistrations().then(function(registrations){
          var pitchIQRegistrations = registrations.filter(function(registration){ return registration.scope.indexOf(baseScope) === 0; });
          return Promise.all(pitchIQRegistrations.map(function(registration){ return registration.unregister(); })).then(function(results){ return results.some(Boolean); });
        });
      }
      if (isLocalDev) {
        Promise.all([unregisterPitchIQWorkers(), clearPitchIQCaches()]).catch(function(error){ console.warn("[PitchIQ dev] Could not clear service-worker state", error); });
        return;
      }
      if (sessionStorage.getItem(migrationKey) === "done") return;
      sessionStorage.setItem(migrationKey, "running");
      Promise.all([unregisterPitchIQWorkers(), clearPitchIQCaches()]).then(function(results){
        sessionStorage.setItem(migrationKey, "done");
        if (results.some(Boolean)) location.replace(location.href);
      }).catch(function(error){
        sessionStorage.setItem(migrationKey, "done");
        console.warn("[PitchIQ] Could not retire legacy service-worker state", error);
      });
    })();
  </script>
